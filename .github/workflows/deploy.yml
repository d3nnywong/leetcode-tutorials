name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# 让 GITHUB_TOKEN 有发布 Pages 的权限
permissions:
  contents: read
  pages: write
  id-token: write

# 同一时间只跑一个部署，新提交会取代排队中的旧任务
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 不固定 version：自动读取 package.json 的 packageManager 字段（pnpm@11）
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm build

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
